<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#12101c" />
    <title>Arcane Covenant</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='%2312101c' stroke='%23ffc94d' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%23a06bff'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Rajdhani:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      window.__errs = [];
      window.addEventListener('error', (e) => window.__errs.push(String(e.message) + ' @ ' + (e.filename || '') + ':' + e.lineno));
      window.addEventListener('unhandledrejection', (e) => window.__errs.push('REJ: ' + String((e.reason && e.reason.stack) || e.reason)));
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
